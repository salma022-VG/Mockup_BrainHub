# Configuración de Nginx para BrainHub Studio
# Ubicar en: /etc/nginx/sites-available/brainhub
# Habilitar: sudo ln -s /etc/nginx/sites-available/brainhub /etc/nginx/sites-enabled/

upstream brainhub_backend {
    # Servidor de aplicación FastAPI en puerto 8000
    server 127.0.0.1:8000;
    # Para múltiples workers (escalabilidad):
    # server 127.0.0.1:8001;
    # server 127.0.0.1:8002;
}

# Redireccionar HTTP a HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name brainhub.example.com;  # Cambiar por tu dominio

    return 301 https://$server_name$request_uri;
}

# Servidor principal HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    server_name brainhub.example.com;  # Cambiar por tu dominio

    # ═══════════════════════════════════════════════════
    # SSL/TLS (Let's Encrypt)
    # ═══════════════════════════════════════════════════
    
    ssl_certificate /etc/letsencrypt/live/brainhub.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brainhub.example.com/privkey.pem;
    
    # Configuración de seguridad SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Headers de seguridad
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ═══════════════════════════════════════════════════
    # LOGS
    # ═══════════════════════════════════════════════════
    
    access_log /var/log/nginx/brainhub_access.log;
    error_log /var/log/nginx/brainhub_error.log;

    # ═══════════════════════════════════════════════════
    # TAMAÑO MÁXIMO DE UPLOAD
    # ═══════════════════════════════════════════════════
    
    client_max_body_size 10M;

    # ═══════════════════════════════════════════════════
    # COMPRESIÓN
    # ═══════════════════════════════════════════════════
    
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/javascript application/json;

    # ═══════════════════════════════════════════════════
    # FRONTEND ESTÁTICO (index.html)
    # ═══════════════════════════════════════════════════
    
    location / {
        # Servir el frontend
        root /var/www/brainhub;
        index index.html;
        
        # SPA routing: cualquier ruta que no sea un archivo, servir index.html
        try_files $uri $uri/ /index.html;
    }

    # ═══════════════════════════════════════════════════
    # ARCHIVOS ESTÁTICOS (CSS, JS, imágenes)
    # ═══════════════════════════════════════════════════
    
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /var/www/brainhub;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ═══════════════════════════════════════════════════
    # API BACKEND (FastAPI)
    # ═══════════════════════════════════════════════════
    
    location /api/ {
        proxy_pass http://brainhub_backend;
        
        # Headers proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ═══════════════════════════════════════════════════
    # DOCUMENTACIÓN DE API (Swagger/ReDoc)
    # ═══════════════════════════════════════════════════
    
    location /docs {
        proxy_pass http://brainhub_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /redoc {
        proxy_pass http://brainhub_backend;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://brainhub_backend;
        proxy_set_header Host $host;
    }

    # ═══════════════════════════════════════════════════
    # HEALTH CHECK
    # ═══════════════════════════════════════════════════
    
    location /health {
        proxy_pass http://brainhub_backend;
        access_log off;
    }

    # ═══════════════════════════════════════════════════
    # 404 - Página no encontrada
    # ═══════════════════════════════════════════════════
    
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
