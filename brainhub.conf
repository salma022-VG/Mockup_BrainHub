server {
    listen 80;
    server_name _; # Cambiar por tu dominio o IP pública de AWS

    # Frontend: Archivos estáticos
    location / {
        root /var/www/brainhub;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend: Proxy a FastAPI (Uvicorn)
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Configuración para evitar errores de timeout en IA
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # Documentación de la API
    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
    }

    # Logs
    access_log /var/log/nginx/brainhub_access.log;
    error_log /var/log/nginx/brainhub_error.log;
}