# Configuración de Nginx para BrainHub
# Ubicación en Ubuntu Server: /etc/nginx/sites-available/brainhub
# Crear enlace simbólico: sudo ln -s /etc/nginx/sites-available/brainhub /etc/nginx/sites-enabled/brainhub

upstream brainhub_api {
    server localhost:8000;
    keepalive 32;
}

upstream brainhub_frontend {
    server localhost:5173;
}

server {
    listen 80;
    listen [::]:80;
    server_name brainhub.example.com www.brainhub.example.com;

    # Redirigir HTTP a HTTPS (cuando configures SSL)
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name brainhub.example.com www.brainhub.example.com;

    # Certificados SSL (usar Let's Encrypt con certbot)
    ssl_certificate /etc/letsencrypt/live/brainhub.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brainhub.example.com/privkey.pem;

    # Configuración SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;

    # Logs
    access_log /var/log/nginx/brainhub_access.log combined;
    error_log /var/log/nginx/brainhub_error.log;

    # Tamaño máximo de upload
    client_max_body_size 10M;

    # Frontend React
    location / {
        root /var/www/brainhub/frontend;
        try_files $uri $uri/ /index.html;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # API Backend
    location /api/ {
        proxy_pass http://brainhub_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # WebSocket support
        proxy_read_timeout 86400;
    }

    # Documentación API
    location /docs {
        proxy_pass http://brainhub_api/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://brainhub_api/openapi.json;
        proxy_set_header Host $host;
    }

    # Archivo de robots.txt
    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow: /api/\n";
    }

    # Negar acceso a archivos ocultos
    location ~ /\. {
        deny all;
    }
}
